<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bronze" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#6b4a1a"/>
      <stop offset="25%"  stop-color="#c8892a"/>
      <stop offset="50%"  stop-color="#e8b84b"/>
      <stop offset="75%"  stop-color="#c8892a"/>
      <stop offset="100%" stop-color="#6b4a1a"/>
    </linearGradient>
    <linearGradient id="bronze-dark" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#4a3010"/>
      <stop offset="30%"  stop-color="#9e6820"/>
      <stop offset="60%"  stop-color="#c8892a"/>
      <stop offset="100%" stop-color="#4a3010"/>
    </linearGradient>
    <linearGradient id="shaft" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#5a3e14"/>
      <stop offset="18%"  stop-color="#b07828"/>
      <stop offset="35%"  stop-color="#d4a040"/>
      <stop offset="50%"  stop-color="#f0c860"/>
      <stop offset="65%"  stop-color="#d4a040"/>
      <stop offset="82%"  stop-color="#b07828"/>
      <stop offset="100%" stop-color="#5a3e14"/>
    </linearGradient>
  </defs>

  <!-- Base bottom slab -->
  <rect x="4" y="28" width="24" height="2.5" rx="0.5" fill="url(#bronze-dark)"/>
  <!-- Base middle step -->
  <rect x="6" y="25.5" width="20" height="2.5" rx="0.5" fill="url(#bronze)"/>

  <!-- Shaft -->
  <rect x="9" y="8" width="14" height="17.5" fill="url(#shaft)"/>
  <!-- Fluting grooves -->
  <line x1="11.5" y1="8" x2="11.5" y2="25.5" stroke="rgba(0,0,0,0.25)" stroke-width="0.7"/>
  <line x1="14"   y1="8" x2="14"   y2="25.5" stroke="rgba(0,0,0,0.25)" stroke-width="0.7"/>
  <line x1="16.5" y1="8" x2="16.5" y2="25.5" stroke="rgba(255,255,255,0.08)" stroke-width="0.5"/>
  <line x1="19"   y1="8" x2="19"   y2="25.5" stroke="rgba(0,0,0,0.25)" stroke-width="0.7"/>
  <line x1="21"   y1="8" x2="21"   y2="25.5" stroke="rgba(0,0,0,0.2)" stroke-width="0.6"/>

  <!-- Capital echinus -->
  <rect x="8" y="6" width="16" height="2" rx="0.4" fill="url(#bronze)"/>
  <!-- Capital abacus -->
  <rect x="5" y="3.5" width="22" height="2.5" rx="0.5" fill="url(#bronze-dark)"/>
  <!-- Capital highlight line -->
  <rect x="7" y="5.8" width="18" height="0.8" fill="rgba(240,200,90,0.4)"/>
</svg>
